<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nena Kozić | Projekti</title>
    <link rel="stylesheet" href="style/projekti.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Stilovi za Popup (Modal) Prozor */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            width: 80%;
            max-width: 850px;
            height: 80vh;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Prilagođavanje tamnoj temi ako je aktivna */
        body.dark-theme .modal-content,
        body:not(.light-mode) .modal-content {
            background-color: #222;
            color: #fff;
        }

        .modal-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        
        body.dark-theme .modal-header,
        body:not(.light-mode) .modal-header {
            border-bottom: 1px solid #444;
        }

        .modal-title {
            margin: 0;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: inherit;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: #ff4d4d;
        }

        .modal-body {
            flex-grow: 1;
            padding: 0;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Dodatni stil za dugmad u edukativnoj kartici */
        .edu-buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='index.html'">N.K.</div>
        
        <div class="hamburger-menu" onclick="toggleMenu()" id="nav-hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="nav-links" id="navbar-links">
            <a href="portfolio.html" id="nav-profil">Profil</a>
            <a href="iskustvo.html" id="nav-iskustvo">Iskustvo</a>
            <a href="edukacija.html" id="nav-edukacija">Edukacija</a>
            <a href="projekti.html" class="active" id="nav-projekti">Projekti</a>
            <a href="dokimologija.html" id="nav-dokimologija" style="display: none;">Dokimologija</a>
            <a href="index.html" class="switch-btn" id="nav-promeni"><i class="fa-solid fa-repeat"></i> Promeni portfolio</a>
        </div>
        <div class="nav-controls">
            <button onclick="toggleJezik()" class="control-btn" id="nav-lang-btn">EN</button>
            <button onclick="toggleTema()" class="control-btn" id="nav-theme-btn"><i class="fa-solid fa-sun"></i></button>
        </div>
    </nav>

    <main class="education-split-container" id="edu-glavni-kontejner" style="grid-template-columns: 1fr; max-width: 900px;">
        
        <section class="edu-column" id="kolona-projekti">
            <h2 class="column-title" id="naslov-projekata"><i class="fa-solid fa-folder-open"></i> Moji projekti</h2>
            <div class="experience-stack" id="projekti-kontejner"></div>
        </section>

    </main>

    <div class="modal-overlay" id="pdf-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Priprema za čas</h3>
                <button class="modal-close-btn" onclick="zatvoriModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <iframe id="pdf-viewer" src=""></iframe>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pdf-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Priprema za čas</h3>
                <button class="modal-close-btn" onclick="zatvoriModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <iframe id="pdf-viewer" src=""></iframe>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p> ©Copyright by Nena Kozić.</p>
    </footer>

    <script>
        const mod = sessionStorage.getItem('portfolioMod') || 'IT';
        document.body.classList.add(mod.toLowerCase() + '-theme');

        let jezik = localStorage.getItem('portfolioJezik') || 'SRB';
        let rezim = localStorage.getItem('portfolioRezim') || 'dark';

        const recnik = {
            'SRB': {
                navProfil: 'Profil', navIskustvo: 'Iskustvo', navEdukacija: 'Edukacija', navProjekti: 'Projekti', navDokimologija: 'Dokimologija', navPromeni: 'Promeni portfolio',
                naslovProjekata: 'Moji projekti',
                tekstLinka: 'Pogledaj kod',
                btnMaterijal: 'Materijal za đake',
                btnPriprema33: 'Priprema za čas broj 33, šesti razred',
                btnPriprema34: 'Priprema za čas broj 34, šesti razred',
                projekti: {
                    IT: [
                        { 
                            naziv: 'Digitalni Portfolio', 
                            podnaslov: 'Lični Projekat', 
                            period: '2026', 
                            opis: 'Responzivna veb prezentacija kreirana u svrhu prikazivanja stečenih veština, obrazovanja i praktičnih radova. Implementirana je dvojezičnost i dinamička promena tema u zavisnosti od smera.', 
                            vestine: ['HTML', 'CSS', 'JavaScript', 'Bootstrap'],
                            link: 'https://github.com/NenaK3/E-portfolio.git'
                        },
                        { 
                            naziv: 'Hospital Management System', 
                            podnaslov: 'Timski projekat na fakultetu', 
                            period: '2024', 
                            opis: 'Kompleksan sistem za upravljanje bolničkim podacima urađen u saradnji sa kolegama Jelenom Ilić i Filipom Šaranovićem. Omogućava efikasno upravljanje pacijentima, pregledima i osobljem. U sklopu projekta odrađeni su i testovi za jedan sloj aplikacije.', 
                            vestine: ['C#', '.NET Core', 'Angular', 'Node.js', 'SQL', 'Visual Studio', 'Unit Testing'],
                            link: 'https://github.com/NenaK3/hospital-management-system.git'
                        }
                    ],
                    Edukacija: [
                        { 
                            naziv: 'Python & Turtle', 
                            podnaslov: 'Rad sa učenicima u školi', 
                            period: '2025 - 2026', 
                            opis: 'Zadaci koje su učenici imali da urade za vežbanje kako bi savladali taj deo gradiva kroz vizuelno programiranje, geometrijske oblike i osnovne algoritme.', 
                            vestine: ['Python', 'Turtle biblioteka', 'Metodika nastave', 'Algoritmi'],
                            link: 'https://github.com/NenaK3/Python-turtle.git'
                        }
                    ]
                }
            },
            'ENG': {
                navProfil: 'Profile', navIskustvo: 'Experience', navEdukacija: 'Education', navProjekti: 'Projects', navDokimologija: 'Assessment', navPromeni: 'Switch Portfolio',
                naslovProjekata: 'My projects',
                tekstLinka: 'View Code',
                btnMaterijal: 'Student Materials',
                btnPriprema33: 'Lesson Plan 33 (6th Grade)',
                btnPriprema34: 'Lesson Plan 34 (6th Grade)',
                projekti: {
                    IT: [
                        { 
                            naziv: 'Digital Portfolio', 
                            podnaslov: 'Personal Project', 
                            period: '2026', 
                            opis: 'A responsive web presentation created to showcase acquired skills, education, and practical work. It features bilingual support and dynamic theme switching based on the selected mode.', 
                            vestine: ['HTML', 'CSS', 'JavaScript', 'Bootstrap'],
                            link: 'https://github.com/NenaK3/E-portfolio.git'
                        },
                        { 
                            naziv: 'Hospital Management System', 
                            podnaslov: 'University Team Project', 
                            period: '2024', 
                            opis: 'A complex hospital data management system developed in collaboration with codebase colleagues Jelena Ilić and Filip Šaranović. It features patient, appointment, and staff management, including unit tests for a specific application layer.', 
                            vestine: ['C#', '.NET Core', 'Angular', 'Node.js', 'SQL', 'Visual Studio', 'Unit Testing'],
                            link: 'https://github.com/NenaK3/hospital-management-system.git'
                        }
                    ],
                    Edukacija: [
                        { 
                            naziv: 'Python & Turtle', 
                            podnaslov: 'School Teaching Work', 
                            period: '2025 - 2026', 
                            opis: 'Tasks and exercises assigned to students to help them master the curriculum through visual programming, geometric shapes, and basic algorithms.', 
                            vestine: ['Python', 'Turtle Library', 'Teaching Methodology', 'Algorithms'],
                            link: 'https://github.com/NenaK3/Python-turtle.git'
                        }
                    ]
                }
            }
        };

        function osvezi() {
            const r = recnik[jezik];
            document.getElementById('nav-profil').innerText = r.navProfil;
            document.getElementById('nav-iskustvo').innerText = r.navIskustvo;
            document.getElementById('nav-edukacija').innerText = r.navEdukacija;
            document.getElementById('nav-projekti').innerText = r.navProjekti;
            document.getElementById('nav-dokimologija').innerText = r.navDokimologija;
            document.getElementById('nav-promeni').innerHTML = `<i class="fa-solid fa-repeat"></i> ${r.navPromeni}`;
            document.getElementById('naslov-projekata').innerHTML = `<i class="fa-solid fa-folder-open"></i> ${r.naslovProjekata}`;

            const dokLink = document.getElementById('nav-dokimologija');
            if (mod === 'Edukacija') {
                dokLink.style.display = 'inline-block';
            } else {
                dokLink.style.display = 'none';
            }

            const projektiKontejner = document.getElementById('projekti-kontejner');
            projektiKontejner.innerHTML = '';
            
            r.projekti[mod].forEach(p => {
                let buttonsHTML = '<div class="edu-buttons-container">';

                if (p.link) {
                    buttonsHTML += `
                        <a href="${p.link}" target="_blank" class="skill-tag ${mod === 'Edukacija' ? 'course-tag' : ''}" style="text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-weight: bold;">
                            <i class="fa-brands fa-github"></i> ${r.tekstLinka}
                        </a>
                    `;
                }

                if (mod === 'Edukacija' && p.naziv.includes('Python & Turtle')) {
                    buttonsHTML += `
                        <button onclick="otvoriModal('assets/priprema/Priprema za čas broj  33, šesti razred.pdf', '${r.btnPriprema33}')" class="skill-tag course-tag" style="border:none; cursor:pointer; font-weight:bold; display:inline-flex; align-items:center; gap:5px;">
                            <i class="fa-solid fa-file-pdf"></i> ${r.btnPriprema33}
                        </button>
                        <button onclick="otvoriModal('assets/priprema/Priprema za čas broj 34, šesti razred.pdf', '${r.btnPriprema34}')" class="skill-tag course-tag" style="border:none; cursor:pointer; font-weight:bold; display:inline-flex; align-items:center; gap:5px;">
                            <i class="fa-solid fa-file-pdf"></i> ${r.btnPriprema34}
                        </button>
                        <a href="https://heyzine.com/flip-book/52580314cc.html" target="_blank" class="skill-tag course-tag" style="text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-weight: bold;">
                            <i class="fa-solid fa-book-open"></i> ${r.btnMaterijal}
                        </a>
                    `;
                }

                buttonsHTML += '</div>';

                projektiKontejner.innerHTML += `
                    <div class="card experience-card edu-split-card ${mod === 'Edukacija' ? 'spec-course-card' : ''}">
                        <div class="exp-header">
                            <div><h3>${p.naziv}</h3><h4>${p.podnaslov}</h4></div>
                            <span class="block-date ${mod === 'Edukacija' ? 'course-date' : ''}">${p.period}</span>
                        </div>
                        <p class="exp-opis">${p.opis}</p>
                        <div class="tag-container" style="margin-top:10px;">
                            ${p.vestine.map(v => `<span class="skill-tag ${mod === 'Edukacija' ? 'course-tag' : ''}">${v}</span>`).join('')}
                        </div>
                        ${buttonsHTML}
                    </div>`;
            });

            document.getElementById('nav-lang-btn').innerText = jezik === 'SRB' ? 'EN' : 'SRB';
        }

        function otvoriModal(pdfPutanja, naslov) {
            document.getElementById('modal-title-text').innerText = naslov;
            document.getElementById('pdf-viewer').src = pdfPutanja;
            document.getElementById('pdf-modal').style.display = 'flex';
        }

        function zatvoriModal() {
            document.getElementById('pdf-modal').style.display = 'none';
            document.getElementById('pdf-viewer').src = '';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('pdf-modal');
            if (event.target == modal) {
                zatvoriModal();
            }
        }

        function primeniRezim() {
            if (rezim === 'light') document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');
            document.getElementById('nav-theme-btn').innerHTML = rezim === 'light' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        }

        function toggleJezik() { jezik = jezik === 'SRB' ? 'ENG' : 'SRB'; localStorage.setItem('portfolioJezik', jezik); osvezi(); }
        function toggleTema() { rezim = rezim === 'dark' ? 'light' : 'dark'; localStorage.setItem('portfolioRezim', rezim); primeniRezim(); }

        function toggleMenu() {
            const links = document.getElementById('navbar-links');
            const hamburger = document.getElementById('nav-hamburger').querySelector('i');
            
            links.classList.toggle('nav-active');
            
            if (links.classList.contains('nav-active')) {
                hamburger.classList.remove('fa-bars');
                hamburger.classList.add('fa-xmark');
            } else {
                hamburger.classList.remove('fa-xmark');
                hamburger.classList.add('fa-bars');
            }
        }

        primeniRezim();
        osvezi();
    </script>
</body>
</html>
